<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Editar Base</title>
    <script>(function(){try{if(localStorage.getItem('theme-pref')==='dark')document.documentElement.className='dark-mode';}catch(e){}})();</script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    .tables-list{ display:flex; flex-direction:column; gap:8px; }
    .table-card{ background:#fff; padding:12px; border-radius:8px; box-shadow:0 4px 14px rgba(2,6,23,0.06); }
    .editable-cell{ cursor:pointer; }
    .data-wrap{ max-height:60vh; overflow:auto; }
    .table-body{ margin-top:8px; padding:12px; background:#fbfdff; border-radius:8px; border:1px solid #eef2f7 }
    /* Admin controls styling */
    .controls-panel{ background: linear-gradient(180deg,#f5f7fb,#eef4fb); padding:10px; border-radius:10px; border:1px solid #e6eef8 }
    .tech-btn{ padding:8px 10px; border-radius:6px; border:1px solid #d1d9e6; background:#fff; }
    /* Use global .btn styles (blue) from style.css to keep consistency across pages */
    .btn.secondary{ background:#fff; color: var(--main-col); border:1px solid #cbd5e1 }
    .btn-wide{ min-width:180px }
    .btn-format{ gap:6px;  padding:0 80px; border-radius:8px; border:1px solid #0f172a;}
    </style>
</head>
<body>
    {% set back_url = '/' %}
    {% set show_back = True %}
    {% include '_site_header.html' %}
    <h1 data-i18n="admin_title">Administración - Editar Base de Datos</h1>
    <p data-i18n="admin_select_table_msg">Seleccione una tabla para ver filas (limitado a 500 filas por tabla).</p>
    <div style="margin:12px 0;">
        <div class="controls-panel" style="display:flex;gap:8px;align-items:center;">
            <button id="new-table-btn" class="btn btn-format" data-i18n="new_table">➕ Nueva tabla</button>
            <button id="export-all-btn" class="btn btn-wide" style="margin-left:8px;" data-i18n="export_all_excel">💾 Exportar todas (Excel)</button>
            <div style="width:16px"></div>
            <label style="font-size:13px;color:#333;margin-left:8px" data-i18n="technology_label">Tecnología:</label>
            <select id="admin-tech-filter" class="tech-btn" style="min-width:180px"></select>
            <label style="font-size:13px;color:#333;margin-left:8px" data-i18n="proposals_user_label">Proposals (Usuario):</label>
            <select id="admin-proposal-user" class="tech-btn" style="min-width:140px">
                <option value="__all__" data-i18n="all_users">Todos</option>
            </select>
            <div style="flex:1"></div>
            <div style="display:flex;gap:8px">
                <button id="apply-filters-btn" class="btn secondary" data-i18n="apply_filters">Aplicar filtros</button>
                <button id="clear-filters-btn" class="btn secondary" data-i18n="clear_filters">Limpiar filtros</button>
            </div>
        </div>
    </div>

    <div id="tables" class="tables-list"></div>

    <!-- Table view is rendered inline below each table card (accordion) -->

    <!-- Edit modal -->
    <div id="edit-overlay" class="info-overlay" aria-hidden="true">
        <div class="info-modal" role="dialog" aria-modal="true">
            <button id="edit-close" class="info-close" aria-label="Cerrar">✕</button>
            <h2 id="edit-title">Editar valor</h2>
            <div id="edit-body"></div>
            <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end">
                <button id="edit-save" class="btn">Guardar</button>
                <button id="edit-cancel" class="btn">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
    {% include '_site_footer.html' %}
</html>
